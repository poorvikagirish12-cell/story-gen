databases:
  - name: story-gen-db
    databaseName: pocketfm
    plan: free

services:
  # The Redis Instance
  - type: redis
    name: story-gen-redis
    ipAllowList: [] # internal only
    plan: free

  # The Django Backend API
  - type: web
    name: story-gen-backend
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: POSTGRES_HOST
        fromDatabase:
          name: story-gen-db
          property: host
      - key: POSTGRES_DB
        fromDatabase:
          name: story-gen-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: story-gen-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: story-gen-db
          property: password
      - key: REDIS_URL
        fromService:
          type: redis
          name: story-gen-redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false

  # The Celery Background Worker
  - type: worker
    name: story-gen-celery
    env: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A backend worker -l info
    envVars:
      - key: POSTGRES_HOST
        fromDatabase:
          name: story-gen-db
          property: host
      - key: POSTGRES_DB
        fromDatabase:
          name: story-gen-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: story-gen-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: story-gen-db
          property: password
      - key: REDIS_URL
        fromService:
          type: redis
          name: story-gen-redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
